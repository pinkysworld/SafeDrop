<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 1600 800' role='img' aria-labelledby='ttl desc'>
  <title id='ttl'>Roadmap</title>
  <desc id='desc'>SafeDrop implementation roadmap across five phases.</desc>
  <rect width='1600' height='800' rx='32' fill='#081120'/>
  <text x='70' y='80' fill='white' font-size='34' font-family='system-ui, -apple-system, Segoe UI, sans-serif' font-weight='700'>Implementation roadmap</text>
  <text x='70' y='118' fill='#93c5fd' font-size='18' font-family='system-ui, -apple-system, Segoe UI, sans-serif'>Build the usable product first, then layer proofs, reachability, privacy, and frontier tracks.</text>
<rect x='70' y='220' width='250' height='330' rx='24' fill='rgba(255,255,255,0.05)' stroke='#2563eb' stroke-width='2.5'/><text x='94' y='264' fill='#2563eb' font-size='18' font-family='system-ui, -apple-system, Segoe UI, sans-serif' font-weight='700'>Phase 0</text><text x='94' y='304' fill='white' font-size='26' font-family='system-ui, -apple-system, Segoe UI, sans-serif' font-weight='700'>Repo bootstrap</text><text x='94' y='344' fill='#cbd5e1' font-size='16' font-family='system-ui, -apple-system, Segoe UI, sans-serif'>Docs, issue map, static site, audit-first domain model</text>
<rect x='370' y='220' width='250' height='330' rx='24' fill='rgba(255,255,255,0.05)' stroke='#0ea5e9' stroke-width='2.5'/><text x='394' y='264' fill='#0ea5e9' font-size='18' font-family='system-ui, -apple-system, Segoe UI, sans-serif' font-weight='700'>Phase 1</text><text x='394' y='304' fill='white' font-size='26' font-family='system-ui, -apple-system, Segoe UI, sans-serif' font-weight='700'>Usable MVP</text><text x='394' y='344' fill='#cbd5e1' font-size='16' font-family='system-ui, -apple-system, Segoe UI, sans-serif'>Upload, download, share links, resumable segments, audit log</text>
<rect x='670' y='220' width='250' height='330' rx='24' fill='rgba(255,255,255,0.05)' stroke='#10b981' stroke-width='2.5'/><text x='694' y='264' fill='#10b981' font-size='18' font-family='system-ui, -apple-system, Segoe UI, sans-serif' font-weight='700'>Phase 2</text><text x='694' y='304' fill='white' font-size='26' font-family='system-ui, -apple-system, Segoe UI, sans-serif' font-weight='700'>Home reachability</text><text x='694' y='344' fill='#cbd5e1' font-size='16' font-family='system-ui, -apple-system, Segoe UI, sans-serif'>UPnP, reachability probes, relay fallback, continuity records</text>
<rect x='970' y='220' width='250' height='330' rx='24' fill='rgba(255,255,255,0.05)' stroke='#f59e0b' stroke-width='2.5'/><text x='994' y='264' fill='#f59e0b' font-size='18' font-family='system-ui, -apple-system, Segoe UI, sans-serif' font-weight='700'>Phase 3</text><text x='994' y='304' fill='white' font-size='26' font-family='system-ui, -apple-system, Segoe UI, sans-serif' font-weight='700'>Proof and privacy</text><text x='994' y='344' fill='#cbd5e1' font-size='16' font-family='system-ui, -apple-system, Segoe UI, sans-serif'>Receipts, deletion evidence, hybrid PQ, metadata protection</text>
<rect x='1270' y='220' width='250' height='330' rx='24' fill='rgba(255,255,255,0.05)' stroke='#f43f5e' stroke-width='2.5'/><text x='1294' y='264' fill='#f43f5e' font-size='18' font-family='system-ui, -apple-system, Segoe UI, sans-serif' font-weight='700'>Phase 4</text><text x='1294' y='304' fill='white' font-size='26' font-family='system-ui, -apple-system, Segoe UI, sans-serif' font-weight='700'>Frontier research</text><text x='1294' y='344' fill='#cbd5e1' font-size='16' font-family='system-ui, -apple-system, Segoe UI, sans-serif'>Relay honesty proofs, ORAM modes, formal specs, federated heuristics</text>
<path d='M320 385 H370 M620 385 H670 M920 385 H970 M1220 385 H1270' stroke='#475569' stroke-width='4'/></svg>
